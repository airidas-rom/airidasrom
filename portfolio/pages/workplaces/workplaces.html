<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="workplaces.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("../../assets/header.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("header").innerHTML = data;
          })
          .catch((error) => console.error("Error loading header:", error));
      });
    </script>
  </head>
  <body>
    <header id="header"></header>
    <div class="workplace-body">
      <a id="workplace-link" href="/workplaces/musicfestival.html">
        <div class="workplace">
          <div class="nameanddate">
            <div class="name">
              <h2>Major Music Festival, Lithuania</h2>
            </div>
            <!-- <div class="date">
              <h2>2024-07-02 to 2024-07-06(07)</h2>
            </div> -->
          </div>
          <div class="description">
            <h2>
              Motivated and hardworking event support specialist with hands-on
              experience in high-paced music festival attended by over 30,000
              people daily.
            </h2>
          </div>
        </div>
      </a>
    </div>
  </body>
</html>
