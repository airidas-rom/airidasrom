<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="home.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("../../assets/header.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("header").innerHTML = data;
          })
          .catch((error) => console.error("Error loading header:", error));
      });
    </script>
  </head>
  <body>
    <header id="header"></header>
    <div class="main-body">
      <div class="text-area">
        <div class="welcome"><h1>Hello! And welcome to my portoflio.</h1></div>
        <div class="description">
          <h2 id="first-part">
            My name is Airidas and thank you for visiting my portoflio, this is my first
            portfolio that i've created on my own and i feel great about it. I
            hope you'll feel the same while giving it a read.
          </h2>
            
              <h2 id="second-part">For more
              information about myself you can see <a id="linktoabout" href="/pages/about/about.html">Here.</a></h2>
            
          </h2>
        </div>
      </div>
    </div>
  </body>
</html>
